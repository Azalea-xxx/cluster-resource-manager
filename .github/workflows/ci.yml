name: Deploy SRE Stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # чтобы можно было запускать вручную

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/cluster-sim
  ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
  ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
  ANSIBLE_SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.DOCKER_IMAGE }}:latest

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible sshpass

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ANSIBLE_HOST }} >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ${{ secrets.ANSIBLE_HOST }}, deploy_all.yml \
            -u ${{ secrets.ANSIBLE_USER }} \
            --private-key ~/.ssh/id_rsa \
            -e "docker_image=${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
