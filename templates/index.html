<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster Management System</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">

    <div id="screen-setup" class="card">
      <h1>Cluster Config</h1>
      <p style="color: #718096; margin-bottom: 30px;">Задайте параметры кластера и количество нагрузок (контейнеров).
      </p>

      <div style="display:flex; gap:20px; margin-bottom:30px;">
        <div style="flex:1">
          <label style="font-size:12px; font-weight:700; color:#a0aec0;">NODES (M)</label>
          <input type="number" id="m" value="4"
            style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-top:5px;">
        </div>
        <div style="flex:1">
          <label style="font-size:12px; font-weight:700; color:#a0aec0;">CONTAINERS (N)</label>
          <input type="number" id="n" value="12"
            style="width:100%; padding:12px; border-radius:10px; border:1px solid #e2e8f0; margin-top:5px;">
        </div>
      </div>

      <button onclick="initData('random')">Generate Random</button>
      <button class="secondary" onclick="initData('manual')">Manual Entry</button>
    </div>

    <div id="screen-data" class="card hidden">
      <h1>Resource Definitions</h1>
      <div style="display:flex; gap:30px;">
        <div style="flex:1">
          <h3>Nodes Setup</h3>
          <div id="nodes-edit"></div>
        </div>
        <div style="flex:1">
          <h3>Containers Setup</h3>
          <div id="containers-edit"></div>
        </div>
      </div>
      <div style="margin-top:40px; border-top: 1px solid #eee; padding-top:20px;">
        <button onclick="saveAndGo()">Initialize Simulation</button>
        <button class="secondary" onclick="location.reload()">Cancel</button>
      </div>
    </div>

    <div id="screen-sim" class="card hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h1>Live Simulation</h1>
        <div style="display:flex; align-items:center; gap:10px;">
          <span style="font-size:12px; font-weight:700; color:#718096;">ALGORITHM:</span>
          <select id="method" onchange="solve()"
            style="background:#2c3e50; color:white; border:none; padding:10px 20px;">
            <option value="1">First Fit (z=1)</option>
            <option value="2">Best Fit (z=2)</option>
            <option value="3">Worst Fit (z=3)</option>
            <option value="4">Genetic Algorithm (z=4)</option>
          </select>
        </div>
      </div>

      <div id="viz" class="grid"></div>

      <div class="metrics-grid">
        <div class="metric-box">
          <h4>Active Nodes</h4>
          <p id="res-n">-</p>
        </div>
        <div class="metric-box">
          <h4>Unplaced</h4>
          <p id="res-p">-%</p>
        </div>
        <div class="metric-box">
          <h4>System Load</h4>
          <p id="res-avg">-/-</p>
        </div>
        <div class="metric-box">
          <h4>Dispersion (D)</h4>
          <p id="res-d">-</p>
        </div>
      </div>

      <button class="secondary" onclick="location.reload()" style="margin-top:40px; width:100%;">Create New
        Experiment</button>
    </div>
  </div>

  <script>
    let currentData = {};
    const cpuValues = [1, 2, 4, 8, 16, 32, 64];
    const ramValues = [512, 1024, 2048, 4096, 8192, 16384, 32768];

    async function initData(mode) {
      const res = await fetch('/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ m: document.getElementById('m').value, n: document.getElementById('n').value, mode })
      });
      currentData = await res.json();
      renderEditTables();
      document.getElementById('screen-setup').classList.add('hidden');
      document.getElementById('screen-data').classList.remove('hidden');
    }

    function renderEditTables() {
      let nH = '<table><tr><th>ID</th><th>CPU</th><th>RAM</th></tr>';
      currentData.nodes.forEach((n, i) => {
        nH += `<tr><td>Node ${n.id}</td>
        <td><select onchange="currentData.nodes[${i}].cpu_max=Number(this.value)">${cpuValues.map(v => `<option value="${v}" ${v == n.cpu_max ? 'selected' : ''}>${v} vCPU</option>`).join('')}</select></td>
        <td><select onchange="currentData.nodes[${i}].ram_max=Number(this.value)">${ramValues.map(v => `<option value="${v}" ${v == n.ram_max ? 'selected' : ''}>${v} MB</option>`).join('')}</select></td></tr>`;
      });
      document.getElementById('nodes-edit').innerHTML = nH + '</table>';

      let cH = '<table><tr><th>ID</th><th>CPU</th><th>RAM</th></tr>';
      currentData.containers.forEach((c, i) => {
        cH += `<tr><td>Cont ${c.id}</td>
        <td><select onchange="currentData.containers[${i}].cpu=Number(this.value)">${cpuValues.map(v => `<option value="${v}" ${v == c.cpu ? 'selected' : ''}>${v} vCPU</option>`).join('')}</select></td>
        <td><select onchange="currentData.containers[${i}].ram=Number(this.value)">${ramValues.map(v => `<option value="${v}" ${v == c.ram ? 'selected' : ''}>${v} MB</option>`).join('')}</select></td></tr>`;
      });
      document.getElementById('containers-edit').innerHTML = cH + '</table>';
    }

    async function saveAndGo() {
      await fetch('/update_data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentData)
      });
      document.getElementById('screen-data').classList.add('hidden');
      document.getElementById('screen-sim').classList.remove('hidden');
      solve();
    }

    async function solve() {
      const method = document.getElementById('method').value;
      const res = await fetch('/solve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ method })
      });
      const data = await res.json();

      let html = '';
      data.nodes.forEach(n => {
        const cpuP = (n.cpu_used / n.cpu_max) * 100 || 0;
        const ramP = (n.ram_used / n.ram_max) * 100 || 0;

        // Определяем цвет полоски
        const color = cpuP > 90 ? '#e74c3c' : (cpuP > 70 ? '#f1c40f' : '#2ecc71');

        html += `<div class="node-card ${n.items.length > 0 ? 'used' : ''}">
            <div class="node-header"><span class="node-id">SERVER ${n.id}</span> <span style="font-size:10px; color:#a0aec0;">${n.items.length} units</span></div>
            
            <div class="progress-label"><span>CPU LOAD</span><span>${Math.round(cpuP)}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(cpuP, 100)}%; background:${color};"></div></div>
            
            <div class="progress-label"><span>RAM LOAD</span><span>${Math.round(ramP)}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(ramP, 100)}%; background:#3498db;"></div></div>
            
            <div style="font-size:11px; color:#718096; background:#f7fafc; padding:8px; border-radius:8px;">
                <strong>Items:</strong> ${n.items.length > 0 ? n.items.join(', ') : 'Empty'}
            </div>
        </div>`;
      });
      document.getElementById('viz').innerHTML = html;
      document.getElementById('res-n').innerText = data.metrics.n_used;
      document.getElementById('res-p').innerText = data.metrics.p_unplaced + '%';
      document.getElementById('res-avg').innerText = `${data.metrics.avg_cpu}% / ${data.metrics.avg_ram}%`;
      document.getElementById('res-d').innerText = data.metrics.dispersion;
    }
  </script>
</body>

</html>
