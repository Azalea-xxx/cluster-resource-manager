apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-agent
  template:
    metadata:
      labels:
        app: zabbix-agent
    spec:
      containers:
        - name: zabbix-agent
          image: zabbix/zabbix-agent2:alpine-7.2-latest
          env:
            - name: ZBX_SERVER_HOST
              value: 'zabbix-server-service'
            - name: ZBX_HOSTNAME
              value: 'k8s-node'
          ports:
            - containerPort: 10050
