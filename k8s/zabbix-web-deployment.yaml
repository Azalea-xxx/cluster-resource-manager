apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:alpine-7.2-latest
          env:
            - name: ZBX_SERVER_HOST
              value: 'zabbix-server-service'
            - name: POSTGRES_USER
              value: 'zabbix'
            - name: POSTGRES_PASSWORD
              value: 'zabbix'
            - name: POSTGRES_DB
              value: 'zabbix'
          ports:
            - containerPort: 8080
